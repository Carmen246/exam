# 开发环境配置文件
spring:
  # 数据库配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yf_exam_lite?useSSL=false&serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: root
    password: rootroot
    # druid相关配置
    druid:
      max-active: 5000
      initial-size: 20
      min-idle: 5
      async-init: true
      # 监控统计
      filters: stat,wall
      filter:
        stat:
          log-slow-sql: true
          slow-sql-millis: 5000
        wall:
          config:
            create-table-allow: false
            alter-table-allow: false
            drop-table-allow: false
            truncate-allow: false

  # 定时任务配置（Spring Boot 2.7 使用 LocalDataSourceJobStore，勿手动指定 JobStoreTX）
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org:
        quartz:
          scheduler:
            instanceName: examScheduler
            instanceId: AUTO
          jobStore:
            tablePrefix: QRTZ_
            isClustered: true
            clusterCheckinInterval: 10000
          threadPool:
            threadCount: 10
            threadPriority: 5

# 文件上传配置
conf:
  upload:
    # 物理文件存储位置，以/结束，windows已正斜杠，如：d:/exam-upload/
    dir: ${user.home}/yfexam-upload/
    # 访问地址，注意不要去除/upload/file/，此节点为虚拟标识符
    # 如：http://localhost:8101/upload/file/exam.jpg，对应物理文件为：/data/upload/exam.jpg
    url: http://localhost:8201/upload/file/
    # 允许上传的文件后缀
    allow-extensions: jpg,jpeg,png

# 开启文档
swagger:
  enable: true

logging:
  level:
    root: debug
  path: logs/${spring.application.name}/
# API调用配置
exam:
  ai:
    provider: openai
    base-url: https://api.deepseek.com
    api-key: ${DEEPSEEK_API_KEY:}
    # 考试系统上传试卷文档后，自动上传到 RAGFlow 知识库并触发解析
    ragflow-auto-upload: true
    ragflow-base-url: http://localhost:9380
    ragflow-api-key: ${RAGFLOW_API_KEY:}
    # 可选：指定知识库 ID；为空时调用 /api/v1/datasets 列表接口自动获取
    ragflow-dataset-id: ${RAGFLOW_DATASET_ID:}
    # 可选：dataset-id 为空时，按知识库名称匹配；也为空则取列表第一个
    ragflow-dataset-name: ${RAGFLOW_DATASET_NAME:}
    ragflow-dataset-page-size: 10
    ragflow-upload-fail-fast: false
    ragflow-upload-timeout-seconds: 120
    model-name: deepseek-v4-flash
    timeout-seconds: 180
    # 切回 DeepSeek 时使用:
    max-text-length: 20000
    normalize-batch-length: 10000
    normalize-batch-question-count: 20
    normalize-concurrency: 3
    # 本地 RAGFlow 对并发聊天解析更敏感，先串行处理批次，避免一批文件拆成多批后同时失败
    ai-concurrency: 2
    parse-fallback-ratio: 0.3
    parse-fallback-min-expected: 3
